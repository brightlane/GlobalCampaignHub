    .sidebar-label{font-family:var(--font-head);font-size:0.62rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);margin-bottom:10px;margin-top:16px}

    .merchant-list{display:flex;flex-direction:column;gap:4px}

    .merchant-item.active{background:rgba(232,255,71,0.08);border-color:rgba(232,255,71,0.3);color:var(--accent)}
    .merchant-cat{font-size:0.6rem;color:var(--dim);font-family:var(--font-head);font-weight:700;letter-spacing:0.08em;text-transform:uppercase}
    .search-box{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:8px 12px;color:var(--text);font-family:var(--font-body);font-size:0.82rem;outline:none;margin-bottom:12px}
    .search-box:focus{border-color:var(--accent)}
    .main{padding:24px;overflow-y:auto}
    .controls{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
    .control-group{display:flex;flex-direction:column;gap:6px}
    .control-label{font-family:var(--font-head);font-size:0.62rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--dim)}

    .btn{font-family:var(--font-head);font-weight:700;font-size:0.78rem;padding:9px 18px;border-radius:7px;border:none;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
    .btn-primary{background:var(--accent);color:#0a0b0d}.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(232,255,71,0.2)}
    .btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}.btn-secondary:hover{border-color:var(--accent)}
    .btn-copy{background:transparent;color:var(--dim);border:1px solid var(--border);font-size:0.72rem;padding:5px 10px}.btn-copy:hover{border-color:var(--accent2);color:var(--accent2)}

    .platforms{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}

    .spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}

            <option value="review">Honest Review</option>

        </div>

            <option value="students">Students</option>
            <option value="small-business">Small Business</option>
            <option value="creators">Content Creators</option>

        </div>
        <div class="control-group">
          <div class="control-label">Custom Angle</div>

        </div>
      </div>

      <!-- Platform selector -->
      <div class="sidebar-label">Platforms</div>
      <div class="platforms" id="platforms">
        <button class="platform-btn active" data-platform="twitter">𝕏 Twitter/X</button>

        <button class="platform-btn" data-platform="threads">🧵 Threads</button>

      <div class="generate-row">
        <button class="btn btn-primary" id="generate-btn" onclick="generateContent()">⚡ Generate Social Content</button>
        <button class="btn btn-secondary" onclick="clearOutput()">Clear</button>
      </div>

      <!-- Output -->
      <div id="output-area"></div>
    </div>
  </main>
</div>

const PLATFORMS = {
  twitter:   { name: '𝕏 Twitter/X',  limit: 280,  emoji: '𝕏' },
  linkedin:  { name: 'LinkedIn',      limit: 3000, emoji: '💼' },
  facebook:  { name: 'Facebook',      limit: 2000, emoji: '📘' },
  instagram: { name: 'Instagram',     limit: 2200, emoji: '📷' },
  tiktok:    { name: 'TikTok',        limit: 2200, emoji: '🎵' },
  reddit:    { name: 'Reddit',        limit: 10000,emoji: '🔴' },
  pinterest: { name: 'Pinterest',     limit: 500,  emoji: '📌' },
  threads:   { name: 'Threads',       limit: 500,  emoji: '🧵' },
};

const HASHTAGS = {
  Tax:       '#TaxTips #TaxSeason #FileTaxes #IRS #TaxExtension #TaxRefund #OnlineTaxes',
  Software:  '#SoftwareDeal #TechDeals #Productivity #Software #AppDeal #TechSavings',
  Education: '#OnlineLearning #Certification #CareerGrowth #StudyTips #ProfessionalDev',
  'Pet Care':'#PetCare #PetHealth #DogMom #CatMom #PetMeds #FurBaby #PetSavings',
  Health:    '#Health #Wellness #HealthTips #LabTests #NaturalHealth #WellnessJourney',
  Auto:      '#CarMods #PerformanceParts #CarBuild #AutoDeal #CarEnthusiast #Tuning',
  Print:     '#CustomPrinting #PrintDesign #BusinessSigns #CustomBanners #CanvasPrint',
  Hardware:  '#HomeImprovement #DIY #Soundproofing #Hardware #HomeStudio #Renovation',
  Lifestyle: '#LifestyleDeals #GiftIdeas #ShopSmart #OnlineShopping #DealOfTheDay',
};

let selectedMerchant = null;
let activePlatforms = new Set(['twitter','linkedin','facebook','instagram']);

// ── Render merchant list
function renderMerchantList(query = '') {
  const list = document.getElementById('merchant-list');
  const cats = {};
  MERCHANTS.forEach(m => {
    if (query && !m.name.toLowerCase().includes(query) && !m.cat.toLowerCase().includes(query)) return;
    if (!cats[m.cat]) cats[m.cat] = [];
    cats[m.cat].push(m);
  });

  list.innerHTML = Object.entries(cats).map(([cat, merchants]) => `
    <div style="margin-bottom:4px">
      <div style="font-family:var(--font-head);font-size:0.58rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);padding:6px 4px 4px">${cat}</div>
      ${merchants.map(m => `
        <div class="merchant-item ${selectedMerchant?.id === m.id ? 'active' : ''}" onclick="selectMerchant('${m.id}')">
          <div>${m.name}</div>
          <div style="font-size:0.65rem;color:var(--dim)">${m.vol}</div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function selectMerchant(id) {
  selectedMerchant = MERCHANTS.find(m => m.id === id);
  if (!selectedMerchant) return;

  document.getElementById('merchant-display').style.display = 'none';
  document.getElementById('generator-ui').style.display = 'block';

  document.getElementById('selected-merchant-info').innerHTML = `
    <div>
      <div class="m-sel-name">${selectedMerchant.name}</div>
      <div class="m-sel-cat">${selectedMerchant.cat} · ${selectedMerchant.kw}</div>
    </div>
    <div class="m-sel-vol">${selectedMerchant.vol}</div>
  `;

  document.getElementById('output-area').innerHTML = '';
  renderMerchantList(document.getElementById('merchant-search').value);
}

// ── Platform toggle
document.querySelectorAll('.platform-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const p = btn.dataset.platform;
    if (activePlatforms.has(p)) {
      if (activePlatforms.size === 1) return; // keep at least one
      activePlatforms.delete(p);
      btn.classList.remove('active');
    } else {
      activePlatforms.add(p);
      btn.classList.add('active');
    }
  });
});

// ── Generate content using Claude API
async function generateContent() {
  if (!selectedMerchant) return;

  const tone = document.getElementById('tone').value;
  const focus = document.getElementById('focus').value;
  const audience = document.getElementById('audience').value;
  const customAngle = document.getElementById('custom-angle').value;
  const m = selectedMerchant;

  const affUrl = `https://www.linkconnector.com/ta.php?lc=${m.lc}&atid=${m.id}&utm_source=gh-social&utm_medium=affiliate&utm_campaign=social-post&utm_content=${Date.now()}`;
  const blogUrl = `${BASE}/blog.html`;

  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Generating...';

  const outputArea = document.getElementById('output-area');
  outputArea.innerHTML = '<div class="loading"><div class="spinner"></div> Calling Claude API to generate content...</div>';

  const platforms = [...activePlatforms];

  const prompt = `Generate social media posts for ${m.name} (${m.cat} category) for the GlobalCampaignHub affiliate site.

Product: ${m.name}
Description: ${m.desc}
Top keyword: ${m.kw}
Search volume: ${m.vol}
Affiliate link: ${affUrl}
Blog guide: ${blogUrl}
Tone: ${tone}
Focus: ${focus}
Target audience: ${audience}
${customAngle ? `Custom angle: ${customAngle}` : ''}

Generate a post for EACH of these platforms: ${platforms.join(', ')}

Each post must:
- Match the platform's character limit and style exactly
- Twitter/X: max 280 chars, punchy, include link
- LinkedIn: professional, 150-300 words, value-driven
- Facebook: conversational, 100-250 words, include link
- Instagram: visual hooks, emojis ok, no clickable links (mention "link in bio")
- TikTok: hook in first line, trendy, conversational
- Reddit: no promotional feel, helpful and informative, subtle mention
- Pinterest: descriptive, SEO-friendly, action-oriented
- Threads: short and punchy like Twitter

Return ONLY a valid JSON object. No markdown.

{
  "twitter": "post text here",
  "linkedin": "post text here",
  "facebook": "post text here",
  "instagram": "post text here",
  "tiktok": "post text here",
  "reddit": "post text here",
  "pinterest": "post text here",
  "threads": "post text here"
}

Only include keys for these platforms: ${platforms.join(', ')}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 3000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content?.[0]?.text || '';
    const posts = JSON.parse(text.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim());

    outputArea.innerHTML = platforms.map(p => {
      if (!posts[p]) return '';
      const pInfo = PLATFORMS[p];
      const postText = posts[p];
      const charCount = postText.length;
      const isOver = charCount > pInfo.limit;
      const tags = HASHTAGS[m.cat] || '';

      return `
        <div class="output-card">
          <div class="output-header">
            <div class="output-platform">${pInfo.emoji} ${pInfo.name}</div>
            <button class="btn btn-copy" onclick="copyText(this, \`${postText.replace(/`/g,'\\`')}\`)">Copy</button>
          </div>
          <div class="output-body">
            <div class="output-text" id="text-${p}">${postText}</div>
            <div class="output-meta">
              <span class="char-count ${isOver?'over':''}">${charCount} / ${pInfo.limit} chars ${isOver?'⚠ Over limit':''}</span>
              <div style="display:flex;gap:6px">
                <button class="btn btn-copy" onclick="copyText(this, \`${postText.replace(/`/g,'\\`')}\`)">📋 Copy Post</button>
                <button class="btn btn-copy" onclick="copyText(this, \`${(postText+' '+tags).replace(/`/g,'\\`')}\`)">📋 + Hashtags</button>
              </div>
            </div>
          </div>
          ${p !== 'reddit' ? `<div class="hashtags"><div class="hashtag-list">${tags}</div></div>` : ''}
        </div>`;
    }).join('');

  } catch(err) {
    outputArea.innerHTML = `<div class="status" style="color:var(--accent3,#ff6b47)">✗ Error: ${err.message}<br><br><small>Make sure you are running this from a context where the Anthropic API is accessible.</small></div>`;
  }

  btn.disabled = false;
  btn.textContent = '⚡ Generate Social Content';
}

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
  });
}

function clearOutput() {
  document.getElementById('output-area').innerHTML = '';
}

// Search
document.getElementById('merchant-search').addEventListener('input', function() {
  renderMerchantList(this.value.toLowerCase());
});

// Init
renderMerchantList();
</script>
</body>
</html>
