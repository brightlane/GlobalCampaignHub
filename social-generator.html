];

const PLATFORMS={twitter:{name:'X Twitter',limit:280,emoji:'X'},linkedin:{name:'LinkedIn',limit:3000,emoji:'in'},facebook:{name:'Facebook',limit:2000,emoji:'f'},instagram:{name:'Instagram',limit:2200,emoji:'IG'},tiktok:{name:'TikTok',limit:2200,emoji:'TT'},reddit:{name:'Reddit',limit:10000,emoji:'r/'},pinterest:{name:'Pinterest',limit:500,emoji:'P'},threads:{name:'Threads',limit:500,emoji:'T'}};
const HASHTAGS={'Tax':'#TaxTips #TaxSeason #FileTaxes #IRS #TaxRefund','Software':'#SoftwareDeal #TechDeals #Productivity #AppDeal','Education':'#OnlineLearning #Certification #CareerGrowth #StudyTips','Pet Care':'#PetCare #PetHealth #DogMom #CatMom #PetMeds','Health':'#Health #Wellness #HealthTips #NaturalHealth','Auto':'#CarMods #PerformanceParts #CarBuild #CarEnthusiast','Print':'#CustomPrinting #BusinessSigns #CustomBanners','Hardware':'#HomeImprovement #DIY #Soundproofing #HomeStudio','Lifestyle':'#LifestyleDeals #GiftIdeas #ShopSmart #OnlineShopping'};

let selectedMerchant=null;
let activePlatforms=new Set(['twitter','linkedin','facebook','instagram']);

function getAffUrl(m){return m.directUrl||('https://www.linkconnector.com/ta.php?lc='+m.lc+'&atid='+m.id+'&utm_source=gh-social&utm_medium=affiliate&utm_campaign=social-post');}

function renderMerchantList(q=''){
  const cats={};
  MERCHANTS.forEach(m=>{
    if(q&&!m.name.toLowerCase().includes(q)&&!m.cat.toLowerCase().includes(q))return;
    if(!cats[m.cat])cats[m.cat]=[];
    cats[m.cat].push(m);
  });
  document.getElementById('merchant-list').innerHTML=Object.entries(cats).map(([cat,ms])=>`
    <div style="margin-bottom:4px">
      <div style="font-family:var(--font-head);font-size:0.58rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);padding:6px 4px 4px">${cat}</div>
      ${ms.map(m=>`<div class="merchant-item ${selectedMerchant&&selectedMerchant.id===m.id?'active':''}" onclick="selectMerchant('${m.id}')"><div>${m.name}</div><div style="font-size:0.65rem;color:var(--dim)">${m.vol}</div></div>`).join('')}
    </div>`).join('');
}

function selectMerchant(id){
  selectedMerchant=MERCHANTS.find(m=>m.id===id);
  if(!selectedMerchant)return;
  document.getElementById('merchant-display').style.display='none';
  document.getElementById('generator-ui').style.display='block';
  document.getElementById('selected-merchant-info').innerHTML=`<div><div class="m-sel-name">${selectedMerchant.name}</div><div class="m-sel-cat">${selectedMerchant.cat} &middot; ${selectedMerchant.kw}</div></div><div class="m-sel-vol">${selectedMerchant.vol}</div>`;
  document.getElementById('output-area').innerHTML='';
  renderMerchantList(document.getElementById('merchant-search').value);
}

document.querySelectorAll('.platform-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const p=btn.dataset.platform;
    if(activePlatforms.has(p)){if(activePlatforms.size===1)return;activePlatforms.delete(p);btn.classList.remove('active');}
    else{activePlatforms.add(p);btn.classList.add('active');}
  });
});

document.getElementById('generate-btn').addEventListener('click',async()=>{
  if(!selectedMerchant)return;
  const m=selectedMerchant;
  const tone=document.getElementById('tone').value;
  const focus=document.getElementById('focus').value;
  const audience=document.getElementById('audience').value;
  const angle=document.getElementById('custom-angle').value;
  const affUrl=getAffUrl(m);
  const platforms=[...activePlatforms];
  const btn=document.getElementById('generate-btn');
  btn.disabled=true;btn.textContent='Generating...';
  const out=document.getElementById('output-area');
  out.innerHTML='<div class="loading"><div class="spinner"></div> Generating content via Claude API...</div>';

  const prompt=`Generate social media posts for ${m.name} (${m.cat}).
Description: ${m.desc}
Top keyword: ${m.kw} (${m.vol} searches/mo)
Affiliate link: ${affUrl}
Tone: ${tone} | Focus: ${focus} | Audience: ${audience}${angle?'\nAngle: '+angle:''}

Write a post for each platform: ${platforms.join(', ')}
Match character limits: Twitter=280, Threads=500, Pinterest=500, LinkedIn=3000, others=2000+
Instagram: say "link in bio" instead of URL. Reddit: helpful tone, no hard sell.

Return ONLY valid JSON (no markdown): {"twitter":"...","linkedin":"...",...}
Include only these keys: ${platforms.join(', ')}`;

  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:3000,messages:[{role:'user',content:prompt}]})});
    const d=await r.json();
    const txt=d.content&&d.content[0]&&d.content[0].text||'';
    const posts=JSON.parse(txt.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim());
    const tags=HASHTAGS[m.cat]||'';

    out.innerHTML=platforms.map(p=>{
      if(!posts[p])return'';
      const pi=PLATFORMS[p];
      const pt=posts[p];
      const over=pt.length>pi.limit;
      return`<div class="output-card">
        <div class="output-header"><div class="output-platform">${pi.emoji} ${pi.name}</div><span class="char-count ${over?'over':''}">${pt.length}/${pi.limit}${over?' ⚠':''}</span></div>
        <div class="output-body">
          <div class="output-text">${pt.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
          <div class="output-meta"><span></span><div style="display:flex;gap:6px">
            <button class="btn btn-copy" onclick="cp(this,${JSON.stringify(pt)})">Copy</button>
            <button class="btn btn-copy" onclick="cp(this,${JSON.stringify(pt+'\n\n'+tags)})">+ Tags</button>
          </div></div>
        </div>
        ${p!=='reddit'?`<div class="hashtags"><div class="hashtag-list">${tags}</div></div>`:''}
      </div>`;
    }).join('');
  }catch(e){out.innerHTML=`<div class="status" style="color:#ff6b47">Error: ${e.message}</div>`;}
  btn.disabled=false;btn.textContent='⚡ Generate Social Content';
});

function cp(btn,text){
  navigator.clipboard.writeText(text).then(()=>{
    const o=btn.textContent;btn.textContent='Copied!';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent=o;btn.classList.remove('copied');},2000);
  });
}

document.getElementById('merchant-search').addEventListener('input',function(){renderMerchantList(this.value.toLowerCase());});
renderMerchantList();
</script>
</body>
</html>
