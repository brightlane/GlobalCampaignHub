name: 🌍 GLOBAL CAMPAIGN HUB ENGINE
on:
  workflow_dispatch:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/10 * * * *'
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: gh-engine-build
      cancel-in-progress: false
    steps:
      - name: 🛰️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: ⚙️ Setup Pages
        uses: actions/configure-pages@v5
      - name: ✅ Validate Required Files
        run: |
          echo "── Checking required files ──"
          test -f index.html              && echo "✓ index.html"              || (echo "✗ index.html MISSING"              && exit 1)
          test -f affiliate.json          && echo "✓ affiliate.json"          || (echo "✗ affiliate.json MISSING"          && exit 1)
          test -f inject.js               && echo "✓ inject.js"               || (echo "✗ inject.js MISSING"               && exit 1)
          test -f post-topics.json        && echo "✓ post-topics.json"        || (echo "✗ post-topics.json MISSING"        && exit 1)
          test -f llms.txt                && echo "✓ llms.txt"                || echo "⚠ llms.txt missing"
          test -f auto-topic-generator.js && echo "✓ auto-topic-generator.js" || echo "⚠ auto-topic-generator.js missing"
          test -f sitemap.xml             && echo "✓ sitemap.xml"             || echo "⚠ sitemap.xml missing"
      - name: 🔧 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 🎯 Auto-Generate Priority Topics
        env:
          ANTHROPIC_API_KEY: ${{ secrets.LC_API_KEY }}
        run: |
          if [ -f auto-topic-generator.js ]; then
            node auto-topic-generator.js
          else
            echo "⚠ auto-topic-generator.js not found — skipping"
          fi
      - name: 🔍 Auto-Generate Targeted Keywords — 20 Languages
        env:
          ANTHROPIC_API_KEY: ${{ secrets.LC_API_KEY }}
        run: |
          if [ -f auto-keyword-generator.js ]; then
            node auto-keyword-generator.js
          else
            echo "⚠ auto-keyword-generator.js not found — skipping"
          fi
      - name: 💉 Blog Injector — 20 Languages
        run: node inject.js
      - name: 🔑 Keyword Injector
        run: |
          if [ -f keyword-injector.js ]; then
            node keyword-injector.js
          else
            echo "⚠ keyword-injector.js not found — skipping"
          fi
      - name: 💾 Commit All Changes
        run: |
          git config user.name  "Global Campaign Hub Engine"
          git config user.email "engine@globalcampaignhub.bot"
          git config pull.rebase true

          git add -A
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "🌍 Auto-inject: $(date -u '+%Y-%m-%d %H:%M UTC')"

          # Retry push up to 5 times — handles concurrent run conflicts
          for i in 1 2 3 4 5; do
            echo "── Push attempt $i ──"
            git fetch origin main

            # Merge remote changes — keep ours for conflicts
            git merge -X ours origin/main --no-edit \
              -m "🔀 Merge remote (attempt $i)" 2>/dev/null || true

            # Resolve any remaining conflicts by keeping our version
            if git diff --name-only --diff-filter=U | grep -q .; then
              echo "Conflicts found — resolving with ours strategy"
              git diff --name-only --diff-filter=U | while read f; do
                git checkout --ours "$f"
                git add "$f"
              done
              git commit --no-edit -m "🔀 Resolve conflicts (ours)" || true
            fi

            git push origin main && echo "✓ Push succeeded on attempt $i" && break || {
              echo "Push failed — waiting 10s before retry $((i+1))"
              sleep 10
            }
          done
      - name: 📤 Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
