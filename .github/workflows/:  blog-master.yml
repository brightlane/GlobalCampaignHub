      - name: Generate blog posts — batch haw,mi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: node generate-blog-post.mjs --lang haw,mi
        continue-on-error: true

      - name: Sleep
        run: sleep 5

      - name: Generate sitemaps
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: node generate-sitemaps.mjs
        continue-on-error: true

      - name: Generate llms.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node generate-llms.mjs
        continue-on-error: true

      - name: Commit and push
        run: |
          git add -A

          # Exit cleanly if nothing changed
          git diff --staged --quiet && echo "Nothing to commit" && exit 0

          git commit -m "blog: $(date -u +%Y-%m-%dT%H:%M:%SZ) — auto-generated posts"

          # Fetch latest remote
          git fetch origin main

          # Rebase our commit on top of remote
          # -X theirs = our generated files always win conflicts
          if git rebase -X theirs origin/main; then
            # Rebase succeeded — push
            git push origin main && exit 0
          fi

          # Rebase failed — abort cleanly
          git rebase --abort || true

          # Nuclear option: reset to remote, re-stage all generated files,
          # recommit, and force push our content
          git reset --hard origin/main
          git add -A
          git diff --staged --quiet && echo "Nothing after reset" && exit 0
          git commit -m "blog: $(date -u +%Y-%m-%dT%H:%M:%SZ) — auto-generated posts (force)"
          git push origin main
