name: Blog Master — GlobalCampaignHub

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      keyword:
        description: 'Specific keyword to generate (optional)'
        required: false
      lang:
        description: 'Language batch e.g. en,es,fr,de (optional, default: all)'
        required: false

permissions:
  contents: write
  models: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Git config
        run: |
          git config user.name "Seo-bot"
          git config user.email "seo-bot@users.noreply.github.com"
          git config pull.rebase true
          git config rebase.autoStash true

      - name: Pull latest — hard reset to remote
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Generate blog posts — batch en,es,fr,de
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          node generate-blog-post.mjs \
            ${{ github.event.inputs.keyword && format('--keyword "{0}"', github.event.inputs.keyword) || '' }} \
            --lang ${{ github.event.inputs.lang || 'en,es,fr,de' }}
        continue-on-error: true

      - name: Sleep
        run: sleep 5

      - name: Generate blog posts — batch pt,pt-br,it,nl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: node generate-blog-post.mjs --lang pt,pt-br,it,nl
        continue-on-error: true

      - name: Sleep
        run: sleep 5

      - name: Generate blog posts — batch pl,ru,uk,tr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: node generate-blog-post.mjs --lang pl,ru,uk,tr
        continue-on-error: true

      - name: Sleep
        run: sleep 5

      - name: Generate blog posts — batch ar,fa,hi,bn
