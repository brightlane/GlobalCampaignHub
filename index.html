<script>
(function() {
  const BASE = 'https://brightlane.github.io/GlobalCampaignHub';
  const PREF_KEY = 'gh_lang_pref';

  const LANG_MAP = {
    'zh': 'blog-zh.html','zh-cn': 'blog-zh.html','zh-sg': 'blog-zh.html',
    'zh-tw': 'blog-zh-tw.html','zh-hk': 'blog-zh-tw.html','zh-mo': 'blog-zh-tw.html',
    'es': 'blog-es.html','es-mx': 'blog-es.html','es-ar': 'blog-es.html',
    'fr': 'blog-fr.html','de': 'blog-de.html',
    'pt-br': 'blog-pt-br.html','pt': 'blog-pt.html',
    'ja': 'blog-ja.html','ko': 'blog-ko.html',
    'it': 'blog-it.html','nl': 'blog-nl.html','pl': 'blog-pl.html',
    'hi': 'blog-hi.html','ar': 'blog-ar.html','ru': 'blog-ru.html',
    'tr': 'blog-tr.html','id': 'blog-id.html','vi': 'blog-vi.html','th': 'blog-th.html',
    'en': null
  };

  const RTL_LANGS = ['ar','he','fa'];

  const normalize = (l='') => l.toLowerCase();

  const cleanPath = location.pathname.split('?')[0].replace(/\/+$/, '');
  const isHomepage = cleanPath === '' || cleanPath === '/' || cleanPath.endsWith('/index.html');
  const isEnglishBlog = cleanPath.endsWith('/blog.html');

  if (!isHomepage && !isEnglishBlog) return;

  const saved = normalize(localStorage.getItem(PREF_KEY));

  if (saved === 'dismissed' || saved === 'en') return;

  if (saved && LANG_MAP.hasOwnProperty(saved)) {
    const target = LANG_MAP[saved];
    if (target && !cleanPath.endsWith('/' + target)) {
      location.href = BASE + '/' + target;
    }
    return;
  }

  const langs = navigator.languages || [navigator.language || 'en'];

  let detected = 'en';
  let file = null;

  for (const l of langs) {
    const lang = normalize(l);
    if (LANG_MAP[lang] !== undefined) {
      detected = lang;
      file = LANG_MAP[lang];
      break;
    }
    const prefix = lang.split('-')[0];
    if (LANG_MAP[prefix] !== undefined) {
      detected = prefix;
      file = LANG_MAP[prefix];
      break;
    }
  }

  if (!file || cleanPath.endsWith('/' + file)) return;

  showBanner(file, detected);

  function showBanner(file, lang) {
    const names = {
      zh:'中文','zh-tw':'繁體中文','es':'Español','fr':'Français','de':'Deutsch',
      pt:'Português','pt-br':'Português (BR)','ja':'日本語','ko':'한국어',
      it:'Italiano','nl':'Nederlands','pl':'Polski','hi':'हिन्दी',
      ar:'العربية','ru':'Русский','tr':'Türkçe','id':'Bahasa Indonesia',
      vi:'Tiếng Việt','th':'ภาษาไทย'
    };

    const nativeName = names[lang] || lang.toUpperCase();
    const url = BASE + '/' + file;
    const isRtl = RTL_LANGS.includes(lang);

    const banner = document.createElement('div');
    banner.id = 'gh-lang-banner';
    banner.setAttribute('role','status');

    banner.style.cssText = `
      position:fixed;bottom:20px;${isRtl?'left':'right'}:20px;
      z-index:9999;background:#111318;border:1px solid rgba(232,255,71,.4);
      border-radius:12px;padding:14px 18px;display:flex;align-items:center;
      gap:12px;font:13px system-ui;color:#e8e9ed;
      box-shadow:0 8px 32px rgba(0,0,0,.4);max-width:320px;
      direction:${isRtl?'rtl':'ltr'};
    `;

    banner.innerHTML = `
      <span>🌐</span>
      <span style="flex:1;color:#8a8d99">
        Read in <strong style="color:#e8e9ed">${nativeName}</strong>?
      </span>
      <button id="gh-switch">Switch</button>
      <button id="gh-dismiss">✕</button>
    `;

    document.body.appendChild(banner);

    const btn = (id) => document.getElementById(id);

    btn('gh-switch').onclick = () => {
      localStorage.setItem(PREF_KEY, lang);
      location.href = url;
    };

    btn('gh-dismiss').onclick = () => {
      localStorage.setItem(PREF_KEY,'dismissed');
      banner.remove();
    };

    // smarter auto-dismiss (15s or on scroll)
    const timer = setTimeout(() => banner.remove(), 15000);
    window.addEventListener('scroll', () => {
      clearTimeout(timer);
      banner.remove();
    }, { once:true });
  }

  // manual controls
  window.GH_setLanguage = function(lang) {
    lang = normalize(lang);
    if (LANG_MAP[lang] !== undefined) {
      localStorage.setItem(PREF_KEY, lang);
      if (LANG_MAP[lang]) location.href = BASE + '/' + LANG_MAP[lang];
      else location.reload();
    }
  };

  window.GH_resetLanguage = function() {
    localStorage.removeItem(PREF_KEY);
    location.reload();
  };

})();
</script>
